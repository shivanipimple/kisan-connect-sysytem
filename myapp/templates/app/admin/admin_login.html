{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KisanConnect | Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .admin-card { border-radius: 15px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card admin-card shadow-lg p-4">
                    <div class="text-center mb-4">
                        <i class="fa fa-user-shield fa-3x text-success"></i>
                        <h4 class="mt-2 fw-bold">Admin Portal</h4>
                        <p class="text-muted small">Authorized Access Only</p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger py-2 small">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="small fw-bold">Admin Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Login to Dashboard</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/" class="text-decoration-none small text-muted"><i class="fa fa-arrow-left"></i> Back to Shop</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
