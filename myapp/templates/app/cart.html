{% extends 'app/base.html' %}
{% block content %}
<style>
    .cart-container { background: #f8f9fa; min-height: 100vh; }
    .cart-card { border-radius: 16px; background: #fff; transition: transform 0.3s, box-shadow 0.3s; border: 1px solid #f0f0f0; }
    .cart-card:hover { transform: translateY(-4px); box-shadow: 0 10px 24px rgba(0,0,0,0.07) !important; }
    .order-summary-card { background: #fff; border-radius: 20px; border: 1px solid #e0e0e0; }
    .btn-checkout { background: linear-gradient(90deg,#28a745,#1e7e34); border: none; transition: opacity 0.3s, transform 0.2s; }
    .btn-checkout:hover { opacity: .92; transform: scale(1.02); }
    .qty-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:50%!important; font-weight:bold; font-size:1rem; }
    .qty-display { min-width:32px; text-align:center; font-weight:700; font-size:1.05rem; }
    .price-text { color:#28a745; font-weight:700; }
    .product-name { color:#333; font-weight:600; }
    .delivery-toggle { background:#f1f3f5; border-radius:12px; padding:12px 14px; border:1px solid #dee2e6; }
    .empty-cart { border-radius:20px; }
</style>

<section class="py-5 cart-container">
    <div class="container">
        <div class="d-flex align-items-center mb-4">
            <div class="bg-success rounded-3 p-2 me-3 text-white">
                <i class="fas fa-shopping-cart fa-lg"></i>
            </div>
            <div>
                <h2 class="fw-bold mb-0">Shopping Cart</h2>
                <small class="text-muted" id="cart-item-label">Loading…</small>
            </div>
        </div>

        <div class="row g-4">
            <!-- Cart Items -->
            <div class="col-lg-8">
                <div id="cart-items-container"></div>
            </div>

            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="card order-summary-card shadow-sm p-4 sticky-top" style="top:100px;">
                    <h5 class="fw-bold mb-4 text-dark border-bottom pb-3">Order Summary</h5>

                    <div class="delivery-toggle mb-4">
                        <label class="small fw-bold text-muted mb-2 d-block">DELIVERY OPTION</label>
                        <div class="form-check form-check-inline mb-0">
                            <input class="form-check-input" type="radio" name="deliveryOption" id="homeDelivery" value="home" checked onchange="renderSummary()">
                            <label class="form-check-label small fw-semibold" for="homeDelivery">🚚 Home Delivery</label>
                        </div>
                        <div class="form-check form-check-inline mb-0">
                            <input class="form-check-input" type="radio" name="deliveryOption" id="selfPickup" value="pickup" onchange="renderSummary()">
                            <label class="form-check-label small fw-semibold" for="selfPickup">🏪 Self Pickup</label>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mb-2 small">
                        <span class="text-secondary">Subtotal</span>
                        <span id="subtotal" class="fw-bold text-dark">₹0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2 small">
                        <span class="text-secondary">GST / Tax (3%)</span>
                        <span id="tax-amount" class="text-danger fw-semibold">₹0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2 small" id="delivery-row">
                        <span class="text-secondary">Delivery (5%)</span>
                        <span id="delivery-amount" class="text-primary fw-semibold">₹0.00</span>
                    </div>
                    <div id="pickup-note" class="alert alert-info py-2 small d-none mb-2">
                        <i class="fas fa-store me-1"></i> No delivery charges for self pickup.
                    </div>

                    <hr class="my-3">
                    <div class="d-flex justify-content-between mb-4">
                        <strong class="fs-5">Grand Total</strong>
                        <strong class="fs-5 text-success" id="grand-total">₹0.00</strong>
                    </div>

                    <button class="btn btn-checkout text-white w-100 py-3 rounded-pill fw-bold shadow mb-3"
                            onclick="proceedToCheckout()">
                        PROCEED TO CHECKOUT <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                    <a href="/" class="btn btn-outline-secondary w-100 rounded-pill small">
                        <i class="fa fa-arrow-left me-2"></i>Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', renderCart);

// ── RENDER ITEMS LIST ────────────────────────────
function renderCart() {
    const cart      = JSON.parse(localStorage.getItem('myCart')) || [];
    const container = document.getElementById('cart-items-container');
    const label     = document.getElementById('cart-item-label');

    const totalQty = cart.reduce((s,i) => s + parseInt(i.quantity||1), 0);
    label.innerText = cart.length === 0 ? 'Your cart is empty'
                    : `${totalQty} item${totalQty>1?'s':''} in cart`;

    if (cart.length === 0) {
        container.innerHTML = `
            <div class="empty-cart text-center py-5 bg-white shadow-sm">
                <img src="https://cdn-icons-png.flaticon.com/512/11329/11329060.png"
                     style="width:140px;opacity:.55;" class="mb-4">
                <h4 class="text-muted fw-bold">Your cart is empty!</h4>
                <p class="text-secondary">Press the button to start shopping. 🛒</p>
                <a href="/" class="btn btn-success mt-2 rounded-pill px-5 py-2 fw-bold">
                    <i class="fas fa-store me-2"></i>start shopping
                </a>
            </div>`;
        renderSummary();
        updateCartCount();
        return;
    }

    container.innerHTML = '';
    cart.forEach((item, index) => {
        // ✅ FIX: price already stored as clean number, but strip just in case
        const price     = parseFloat(String(item.price).replace(/[^0-9.]/g,'')) || 0;
        const qty       = parseInt(item.quantity || 1);
        const itemTotal = price * qty;
        const img       = item.image || 'https://placehold.co/100x100?text=No+Image';

        container.innerHTML += `
            <div class="card cart-card mb-3 border-0 shadow-sm overflow-hidden" id="cartrow-${index}">
                <div class="row g-0 align-items-center p-3">
                    <div class="col-3 col-md-2 text-center">
                        <img src="${img}" class="img-fluid rounded-3 shadow-sm"
                             style="height:80px;width:80px;object-fit:contain;"
                             onerror="this.src='https://placehold.co/80x80'" alt="${item.name}">
                    </div>
                    <div class="col-9 col-md-4 px-3">
                        <h6 class="product-name mb-1 text-truncate">${item.name}</h6>
                        <p class="mb-0 text-muted small">Weight: <span class="text-dark fw-bold">${item.weight||'Default'}</span></p>
                        <p class="mb-0 text-muted small">Unit: <span class="text-dark fw-bold">₹${price.toFixed(2)}</span></p>
                    </div>
                    <div class="col-6 col-md-3 mt-3 mt-md-0 d-flex justify-content-center">
                        <div class="d-flex align-items-center bg-light rounded-pill p-1 border gap-2">
                            <button class="btn qty-btn btn-white border shadow-sm" onclick="changeQty(${index},-1)">−</button>
                            <span class="qty-display">${qty}</span>
                            <button class="btn qty-btn btn-success shadow-sm" onclick="changeQty(${index},1)">+</button>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 mt-3 mt-md-0 text-end pe-2">
                        <h5 class="price-text mb-1">₹${itemTotal.toFixed(2)}</h5>
                        <button class="btn btn-sm text-danger p-0 border-0 bg-transparent" onclick="removeItem(${index})">
                            <i class="fas fa-trash-alt me-1"></i>Remove
                        </button>
                    </div>
                </div>
            </div>`;
    });

    renderSummary();
    updateCartCount();
}

// ── SUMMARY PANEL ────────────────────────────────
function renderSummary() {
    const cart     = JSON.parse(localStorage.getItem('myCart')) || [];
    const isPickup = document.getElementById('selfPickup')?.checked || false;

    const subtotal = cart.reduce((sum,item) => {
        const p = parseFloat(String(item.price).replace(/[^0-9.]/g,'')) || 0;
        return sum + p * parseInt(item.quantity||1);
    }, 0);

    const tax      = subtotal * 0.03;
    const delivery = isPickup ? 0 : subtotal * 0.05;
    const total    = subtotal + tax + delivery;
    const fmt = n => '₹' + n.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});

    document.getElementById('subtotal').innerText        = fmt(subtotal);
    document.getElementById('tax-amount').innerText      = fmt(tax);
    document.getElementById('delivery-amount').innerText = fmt(delivery);
    document.getElementById('grand-total').innerText     = fmt(total);

    const dRow = document.getElementById('delivery-row');
    const pNote = document.getElementById('pickup-note');
    if (isPickup) {
        dRow.style.opacity = '.4'; dRow.style.textDecoration = 'line-through';
        pNote.classList.remove('d-none');
    } else {
        dRow.style.opacity = '1'; dRow.style.textDecoration = 'none';
        pNote.classList.add('d-none');
    }
}

// ── QTY CHANGE ───────────────────────────────────
function changeQty(index, delta) {
    let cart = JSON.parse(localStorage.getItem('myCart')) || [];
    if (!cart[index]) return;
    cart[index].quantity = parseInt(cart[index].quantity||1) + delta;
    if (cart[index].quantity < 1) { removeItem(index); return; }
    localStorage.setItem('myCart', JSON.stringify(cart));
    renderCart();
}

// ── REMOVE ITEM ──────────────────────────────────
function removeItem(index) {
    const row = document.getElementById('cartrow-' + index);
    const doRemove = () => {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('myCart', JSON.stringify(cart));
        renderCart();
    };
    if (row) {
        row.style.transition = 'opacity .25s, transform .25s';
        row.style.opacity = '0'; row.style.transform = 'translateX(30px)';
        setTimeout(doRemove, 250);
    } else { doRemove(); }
}

// ── CART BADGE ───────────────────────────────────
function updateCartCount() {
    const cart  = JSON.parse(localStorage.getItem('myCart')) || [];
    const badge = document.getElementById('cart-count');
    if (badge) {
        const total = cart.reduce((s,i) => s+parseInt(i.quantity||1), 0);
        badge.innerText = total;
        badge.style.display = total === 0 ? 'none' : 'inline-block';
    }
}

// ── CHECKOUT ─────────────────────────────────────
function proceedToCheckout() {
    const cart = JSON.parse(localStorage.getItem('myCart')) || [];
    if (cart.length === 0) { alert('कार्ट रिकामी आहे! आधी उत्पादने जोडा.'); return; }
    const isPickup = document.getElementById('selfPickup').checked;
    localStorage.setItem('deliveryMethod', isPickup ? 'pickup' : 'delivery');
    window.location.href = '/checkout/';
}
</script>
{% endblock %}
