{% extends 'app/admin/base.html' %}
{% block content %}
<div class="content-body">
    <h2 class="fw-bold text-dark mb-4">Transaction History</h2>
    <div class="card border-0 shadow-sm p-3">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Order ID</th>
                    <th>Transaction ID</th>
                    <th>Method</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                {% for tx in transactions %}
                <tr>
                    <td>{{ tx.timestamp|date:"d M Y, h:i A" }}</td>
                    <td>#{{ tx.order.id }}</td>
                    <td><code class="text-primary">{{ tx.transaction_id }}</code></td>
                    <td>{{ tx.payment_mode }}</td>
                    <td class="fw-bold text-success">₹{{ tx.amount }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
